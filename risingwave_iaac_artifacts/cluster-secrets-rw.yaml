# GHA workflow to seed AWS Secrets Manager with RisingWave-related secrets.
# Mirrors the existing iaac-talos onprem-cluster-secrets pattern.
#
# Seeds these SM secrets per cluster:
#   - <cluster_name>/risingwave/postgres   {username, password, postgres-password}
#   - <cluster_name>/risingwave/root       {password}
#   - <cluster_name>/risingwave/license    {key}    (when Tim has the premium key from RW Labs)
#
# Idempotent: uses create-or-update via `aws secretsmanager` (creates if missing,
# updates secret-string in place if exists).
#
# Live values are randomly generated on first apply and stored only in SM.
# Subsequent applies leave existing values untouched unless --rotate is set.
#
# Prerequisite (one-time per AWS account):
#   IAM role `github-actions-onprem-cluster-secrets` with:
#     - Trust: GitHub OIDC, scoped to variant-inc/iaac-risingwave-onprem main branch
#     - Permissions:
#         secretsmanager:CreateSecret
#         secretsmanager:UpdateSecret
#         secretsmanager:PutSecretValue
#         secretsmanager:DescribeSecret
#         secretsmanager:GetSecretValue
#         on resource: arn:aws:secretsmanager:us-east-2:*:secret:<cluster>/risingwave/*
#   Set repo secret ONPREM_CLUSTER_SECRETS_ROLE_ARN_<ENV> to its ARN.

name: OnPremise Cluster Secrets — RisingWave

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target environment (AWS account to seed)'
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
        default: dev
      cluster_name:
        description: 'Cluster name (used as SM secret prefix)'
        required: true
        type: string
        default: op-usxpress-dev
      rotate_root:
        description: 'Rotate the RW root password (overwrites existing value)'
        type: boolean
        default: false
      rotate_postgres:
        description: 'Rotate the Postgres password (overwrites existing value)'
        type: boolean
        default: false
      dry_run:
        description: 'Preview without writing to SM'
        type: boolean
        default: false

jobs:
  seed-secrets:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: us-east-2

    steps:
      - name: Determine AWS role ARN by env
        id: role
        run: |
          case "${{ inputs.target_env }}" in
            dev)  echo "arn=${{ secrets.ONPREM_CLUSTER_SECRETS_ROLE_ARN_DEV }}"  >> "$GITHUB_OUTPUT" ;;
            qa)   echo "arn=${{ secrets.ONPREM_CLUSTER_SECRETS_ROLE_ARN_QA }}"   >> "$GITHUB_OUTPUT" ;;
            prod) echo "arn=${{ secrets.ONPREM_CLUSTER_SECRETS_ROLE_ARN_PROD }}" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unknown env"; exit 1 ;;
          esac

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.role.outputs.arn }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify caller identity
        run: aws sts get-caller-identity

      - name: Seed risingwave/postgres
        env:
          SECRET_NAME: ${{ inputs.cluster_name }}/risingwave/postgres
          ROTATE: ${{ inputs.rotate_postgres }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if aws secretsmanager describe-secret --secret-id "$SECRET_NAME" >/dev/null 2>&1; then
            EXISTS=true
          else
            EXISTS=false
          fi

          if [[ "$EXISTS" == "true" && "$ROTATE" != "true" ]]; then
            echo "Secret $SECRET_NAME exists; not rotating (set rotate_postgres to overwrite)."
            exit 0
          fi

          PG_PASSWORD=$(openssl rand -base64 24 | tr -d '/+=')
          PG_ADMIN_PASSWORD=$(openssl rand -base64 24 | tr -d '/+=')
          PAYLOAD=$(jq -nc \
            --arg u "risingwave" \
            --arg p "$PG_PASSWORD" \
            --arg ap "$PG_ADMIN_PASSWORD" \
            '{username:$u, password:$p, "postgres-password":$ap}')

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "DRY RUN: would $( [[ $EXISTS == true ]] && echo update || echo create ) $SECRET_NAME"
            exit 0
          fi

          if [[ "$EXISTS" == "true" ]]; then
            aws secretsmanager update-secret --secret-id "$SECRET_NAME" --secret-string "$PAYLOAD" >/dev/null
            echo "Updated $SECRET_NAME"
          else
            aws secretsmanager create-secret --name "$SECRET_NAME" --secret-string "$PAYLOAD" \
              --description "Postgres metastore credentials for RisingWave on $CLUSTER" \
              --tags Key=cluster,Value="${{ inputs.cluster_name }}" Key=app,Value=risingwave Key=managed-by,Value=gha-onprem-cluster-secrets >/dev/null
            echo "Created $SECRET_NAME"
          fi

      - name: Seed risingwave/root
        env:
          SECRET_NAME: ${{ inputs.cluster_name }}/risingwave/root
          ROTATE: ${{ inputs.rotate_root }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if aws secretsmanager describe-secret --secret-id "$SECRET_NAME" >/dev/null 2>&1; then
            EXISTS=true
          else
            EXISTS=false
          fi

          if [[ "$EXISTS" == "true" && "$ROTATE" != "true" ]]; then
            echo "Secret $SECRET_NAME exists; not rotating (set rotate_root to overwrite)."
            exit 0
          fi

          ROOT_PASSWORD=$(openssl rand -base64 24 | tr -d '/+=')
          PAYLOAD=$(jq -nc --arg p "$ROOT_PASSWORD" '{password:$p}')

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "DRY RUN: would $( [[ $EXISTS == true ]] && echo update || echo create ) $SECRET_NAME"
            exit 0
          fi

          if [[ "$EXISTS" == "true" ]]; then
            aws secretsmanager update-secret --secret-id "$SECRET_NAME" --secret-string "$PAYLOAD" >/dev/null
            echo "Updated $SECRET_NAME — note: requires re-running the rw-bootstrap-root-password Job to take effect"
          else
            aws secretsmanager create-secret --name "$SECRET_NAME" --secret-string "$PAYLOAD" \
              --description "RisingWave root user password for $CLUSTER" \
              --tags Key=cluster,Value="${{ inputs.cluster_name }}" Key=app,Value=risingwave Key=managed-by,Value=gha-onprem-cluster-secrets >/dev/null
            echo "Created $SECRET_NAME"
          fi

      # license is seeded MANUALLY (Tim coordinates with RW Labs / Zach for the key string).
      # We don't auto-generate this. Seeding it here is explicit:
      #   aws secretsmanager create-secret --name op-usxpress-dev/risingwave/license \
      #     --secret-string '{"key":"<paste-key-from-RW-Labs>"}' --region us-east-2

      - name: Summary
        run: |
          echo "## RisingWave secrets seeded for ${{ inputs.cluster_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Secret | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| ${{ inputs.cluster_name }}/risingwave/postgres | seeded/updated |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ${{ inputs.cluster_name }}/risingwave/root | seeded/updated |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ${{ inputs.cluster_name }}/risingwave/license | manual (paste from RW Labs) |" >> "$GITHUB_STEP_SUMMARY"
