# ExternalSecret pulling Postgres metastore credentials from AWS SM into a k8s Secret.
# The k8s Secret is then consumed by:
#   - the Postgres StatefulSet (or Bitnami HelmRelease when corp-CA is fixed)
#   - the RisingWave CR's spec.metaStore.postgres.credentials.secretName
#
# Source SM secret: <cluster>/risingwave/postgres (seeded by cluster-secrets-rw.yaml workflow)
# Target k8s Secret: pg-credentials
#
# Place at: iaac-talos-flux-platform/infrastructure/risingwave/manifests-pg-externalsecret.yaml
# (or future iaac-risingwave-onprem/manifests/op-usxpress-dev/pg-externalsecret.yaml)
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: pg-credentials
  namespace: risingwave
  labels:
    app: risingwave
    role: metastore-creds
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager   # ClusterSecretStore — confirm the exact name on this cluster
    kind: ClusterSecretStore
  target:
    name: pg-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: op-usxpress-dev/risingwave/postgres
        property: username
    - secretKey: password
      remoteRef:
        key: op-usxpress-dev/risingwave/postgres
        property: password
    - secretKey: postgres-password
      remoteRef:
        key: op-usxpress-dev/risingwave/postgres
        property: postgres-password
