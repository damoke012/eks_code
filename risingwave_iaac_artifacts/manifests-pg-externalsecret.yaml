# ExternalSecret pulling Postgres metastore credentials from AWS SM into a k8s Secret.
# The k8s Secret is consumed by:
#   - the Postgres StatefulSet (env vars POSTGRES_USER/POSTGRES_PASSWORD reference this Secret)
#   - the RisingWave CR's spec.metaStore.postgresql.credentials.secretName
#
# Source SM secret: op-usxpress-dev/risingwave/postgres
#   (seeded manually 2026-05-01; future: cluster-secrets-rw.yaml workflow)
# Target k8s Secret: risingwave-pg-credentials
#
# DEPLOYED & VERIFIED 2026-05-01: Started with creationPolicy: Merge to claim the
# existing hand-rolled Secret without a delete-recreate gap, then switched to Owner
# once SecretSynced=True. Self-heal verified — `kubectl delete secret` recreates
# from SM in <5s.
#
# Cluster API version: external-secrets.io/v1 (NOT v1beta1)
# ClusterSecretStore: default (AWS SecretsManager provider, us-east-2)
#
# Place at: iaac-talos-flux-platform/infrastructure/risingwave/pg-externalsecret.yaml
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: risingwave-pg-credentials
  namespace: risingwave
  labels:
    app: risingwave
    role: metastore-creds
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: default
    kind: ClusterSecretStore
  target:
    name: risingwave-pg-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: op-usxpress-dev/risingwave/postgres
        property: username
    - secretKey: password
      remoteRef:
        key: op-usxpress-dev/risingwave/postgres
        property: password
