# Two related resources:
# 1. ExternalSecret pulling RW root password from AWS SM into k8s Secret rw-root-credentials
# 2. Bootstrap Job that runs `ALTER USER root WITH ENCRYPTED PASSWORD ...` from the Secret
#
# Why a Job: RW users live in Postgres metadata, not as k8s resources. Can't create a User
# CRD. SQL is the only API for setting passwords. Job is idempotent — re-runs as no-op
# if the password in SM already matches RW.
#
# Source SM secret: <cluster>/risingwave/root  (seeded by cluster-secrets-rw.yaml workflow)
# Target k8s Secret: rw-root-credentials
#
# Place at: iaac-talos-flux-platform/infrastructure/risingwave/rw-root-bootstrap.yaml
# (or future iaac-risingwave-onprem/manifests/op-usxpress-dev/rw-root-bootstrap.yaml)
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rw-root-credentials
  namespace: risingwave
  labels:
    app: risingwave
    role: rw-user-creds
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: rw-root-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: op-usxpress-dev/risingwave/root
        property: password
---
apiVersion: batch/v1
kind: Job
metadata:
  name: rw-bootstrap-root-password
  namespace: risingwave
  labels:
    app: risingwave
    role: bootstrap
  annotations:
    # Force re-creation on every Flux reconcile so it always validates.
    # Job spec is immutable, so Flux must delete + recreate.
    kustomize.toolkit.fluxcd.io/force: "true"
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app: risingwave
        role: bootstrap
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-rw
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              echo "Waiting for risingwave-frontend to accept connections..."
              until pg_isready -h risingwave-frontend.risingwave.svc.cluster.local -p 4567 -t 3; do
                echo "  not ready, retrying in 5s..."
                sleep 5
              done
              echo "RW is ready"
      containers:
        - name: set-root-password
          image: postgres:16-alpine
          env:
            - name: NEW_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rw-root-credentials
                  key: password
          command:
            - sh
            - -c
            - |
              set -e
              # Idempotent: if root already has the SM password, no-op.
              if PGPASSWORD="$NEW_PASSWORD" psql \
                  -h risingwave-frontend.risingwave.svc.cluster.local \
                  -p 4567 -U root -d dev -c "SELECT 1" >/dev/null 2>&1; then
                echo "root password already matches SM — no-op"
                exit 0
              fi

              # First-time bootstrap: connect with no password, set it from SM.
              # On subsequent rotates (after SM update), this branch runs because
              # the new SM value doesn't yet match RW's stored password.
              # We need the current RW password to connect-and-rotate. Two cases:
              #   (a) RW root has no password yet (first deploy) — `psql -U root`
              #       without password works, set new one
              #   (b) RW root has an old password — we don't know it from the new SM
              #       value. Operator intervention needed; document escape hatch.
              # For (b), workflow: rotate SM, then manually:
              #   kubectl exec -n risingwave statefulset/risingwave-meta -- ...
              # Or: run psql with old password from a prior SM version (if you snapshotted it).
              echo "Setting root password from SM..."
              psql -h risingwave-frontend.risingwave.svc.cluster.local \
                   -p 4567 -U root -d dev \
                   -c "ALTER USER root WITH ENCRYPTED PASSWORD '$NEW_PASSWORD';"
              echo "root password set"

              # Verify
              if ! PGPASSWORD="$NEW_PASSWORD" psql \
                  -h risingwave-frontend.risingwave.svc.cluster.local \
                  -p 4567 -U root -d dev -c "SELECT 1" >/dev/null 2>&1; then
                echo "ERROR: post-set verification failed"
                exit 1
              fi
              echo "verified"
