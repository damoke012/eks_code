# Two related resources:
# 1. ExternalSecret pulling RW root password from AWS SM → k8s Secret rw-root-credentials
#    DEPLOYED & VERIFIED 2026-05-01 with creationPolicy: Owner. SecretSynced=True.
# 2. Bootstrap Job that runs `ALTER USER root` from SM-sourced password.
#    NOT YET DEPLOYED — rotation flow needs design (see comment in Job spec below).
#    The current root password matches what's in SM (we set it manually with that value),
#    so the Job would no-op anyway. Deploy the Job once we have a proper rotation runbook.
#
# Source SM secret: op-usxpress-dev/risingwave/root
# Target k8s Secret: rw-root-credentials
#
# Cluster API version: external-secrets.io/v1
# ClusterSecretStore: default
#
# Place at: iaac-talos-flux-platform/infrastructure/risingwave/rw-root-bootstrap.yaml
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rw-root-credentials
  namespace: risingwave
  labels:
    app: risingwave
    role: rw-user-creds
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: default
    kind: ClusterSecretStore
  target:
    name: rw-root-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: op-usxpress-dev/risingwave/root
        property: password
---
# !! NOT YET DEPLOYED — see top-of-file note. Reviewed shape below for when we are
# ready to deploy. Open design questions:
#   - Rotation case: Job needs to know the OLD password to ALTER USER it to NEW.
#     Currently no source for OLD. Options: a separate temporary SM secret
#     `op-usxpress-dev/risingwave/root-rotation` holding the previous value during
#     rotation; or operator-driven rotation via `kubectl exec` runbook.
#   - Job should run as a Helm-style post-install hook OR a Flux Kustomization
#     dependsOn so it executes after RW is Ready, not before.
#   - Idempotency: if NEW_PASSWORD already works, no-op. Already encoded in command.
apiVersion: batch/v1
kind: Job
metadata:
  name: rw-bootstrap-root-password
  namespace: risingwave
  labels:
    app: risingwave
    role: bootstrap
  annotations:
    # Force Flux to re-create on every reconcile so it always validates idempotency.
    # Job spec is immutable, so Flux must delete + recreate.
    kustomize.toolkit.fluxcd.io/force: "true"
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app: risingwave
        role: bootstrap
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-rw
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              echo "Waiting for risingwave-frontend to accept connections..."
              until pg_isready -h risingwave-frontend.risingwave.svc.cluster.local -p 4567 -t 3; do
                echo "  not ready, retrying in 5s..."
                sleep 5
              done
              echo "RW is ready"
      containers:
        - name: set-root-password
          image: postgres:16-alpine
          env:
            - name: NEW_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rw-root-credentials
                  key: password
            # Future: OLD_PASSWORD as optional env from a temporary rotation Secret.
            # Until that's wired, this Job only handles "first-time set" or "no-op
            # if matches" — NOT rotation.
          command:
            - sh
            - -c
            - |
              set -e
              # Idempotent: if root already has the SM password, no-op.
              if PGPASSWORD="$NEW_PASSWORD" psql \
                  -h risingwave-frontend.risingwave.svc.cluster.local \
                  -p 4567 -U root -d dev -c "SELECT 1" >/dev/null 2>&1; then
                echo "root password already matches SM — no-op"
                exit 0
              fi

              # First-time bootstrap: connect with no password, set it from SM.
              echo "Setting root password from SM..."
              psql -h risingwave-frontend.risingwave.svc.cluster.local \
                   -p 4567 -U root -d dev \
                   -c "ALTER USER root WITH ENCRYPTED PASSWORD '$NEW_PASSWORD';"
              echo "root password set"

              # Verify post-set
              if ! PGPASSWORD="$NEW_PASSWORD" psql \
                  -h risingwave-frontend.risingwave.svc.cluster.local \
                  -p 4567 -U root -d dev -c "SELECT 1" >/dev/null 2>&1; then
                echo "ERROR: post-set verification failed"
                exit 1
              fi
              echo "verified"
