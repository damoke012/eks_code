---
# Argo CD platform stack — INFRA-1622. Flux-installed (adopts the 49-day raw install).
# Chart 10.2.0 = Argo CD v3.4.5. Values verified by `helm template` (server.insecure
# reaches argocd-cmd-params-cm, no NodePort, dex/notifications off, nodeSelector applies).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argocd
  namespace: argocd
spec:
  interval: 30m
  chart:
    spec:
      chart: argo-cd
      version: "10.2.0"
      sourceRef:
        kind: HelmRepository
        name: argo
        namespace: argocd
      interval: 12h
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    global:
      # dev has flat workers (no pool labels) — do NOT pin nodeSelector here.
      # (QA/prod overlays add pool: platform.)
      {}
    configs:
      # CRITICAL: do NOT let Helm create/own argocd-secret. The existing secret
      # holds server.secretkey (session signing) + TLS; Helm creating it would
      # regenerate the key and break every session + admin login. We preserve
      # the live argocd-secret across the cutover; the admin ExternalSecret
      # continues to Merge admin.password into it.
      secret:
        createSecret: false
      params:
        server.insecure: true
      cm:
        admin.enabled: "true"
        resource.exclusions: |
          - apiGroups:
              - kustomize.toolkit.fluxcd.io
              - source.toolkit.fluxcd.io
              - helm.toolkit.fluxcd.io
              - notification.toolkit.fluxcd.io
            kinds: ['*']
            clusters: ['*']
          - apiGroups: ['', discovery.k8s.io]
            kinds: [Endpoints, EndpointSlice]
          - apiGroups: [coordination.k8s.io]
            kinds: [Lease]
          - apiGroups: [cilium.io]
            kinds: [CiliumIdentity, CiliumEndpoint, CiliumEndpointSlice]
          - apiGroups: [kyverno.io, reports.kyverno.io, wgpolicyk8s.io]
            kinds: [PolicyReport, ClusterPolicyReport, EphemeralReport, ClusterEphemeralReport, AdmissionReport, ClusterAdmissionReport, BackgroundScanReport, ClusterBackgroundScanReport, UpdateRequest]
        resource.customizations.ignoreResourceUpdates.all: |
          jsonPointers:
            - /status
    server:
      service:
        type: ClusterIP
      replicas: 1
      resources:
        requests: { cpu: 100m, memory: 128Mi }
        limits: { cpu: 500m, memory: 512Mi }
    controller:
      replicas: 1
      resources:
        requests: { cpu: 250m, memory: 512Mi }
        limits: { cpu: "1", memory: 2Gi }
    repoServer:
      replicas: 1
      resources:
        requests: { cpu: 100m, memory: 256Mi }
        limits: { cpu: 500m, memory: 1Gi }
    applicationSet:
      # no `enabled` toggle in chart 10.x — sized, not wished away.
      resources:
        requests: { cpu: 50m, memory: 64Mi }
        limits: { cpu: 200m, memory: 256Mi }
    notifications:
      enabled: false
    dex:
      enabled: false
    redis:
      enabled: true
      resources:
        requests: { cpu: 50m, memory: 64Mi }
        limits: { cpu: 200m, memory: 256Mi }
