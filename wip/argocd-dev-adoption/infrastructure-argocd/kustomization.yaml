apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# No top-level namespace: transformer (that trap rewrote a Velero Schedule out of
# its namespace on the RW repo). Every resource carries its own namespace.
resources:
  - namespace.yaml
  - helmrepository.yaml
  - helmrelease.yaml
  - appprojects.yaml
  - admin-externalsecret.yaml
# NOTE: git ExternalSecret deliberately absent — it credentialed the removed RW
# Application. Add per-app-repo creds when the first app team onboards.
# NOTE: AppProjects require the argocd CRDs. On dev they already exist (49d install).
# For QA/prod greenfield, split AppProjects into a Kustomization dependsOn argocd.
