---
# ─────────────────────────────────────────────────────────────────────────
# CephBlockPool — RBD-backed replicated pool for ceph-block SC.
# This is what Mimir, Loki, Promtail, and anything else that wants RWO
# replicated block storage will land on.
# ─────────────────────────────────────────────────────────────────────────
apiVersion: ceph.rook.io/v1
kind: CephBlockPool
metadata:
  name: replicapool
  namespace: rook-ceph
spec:
  failureDomain: host
  replicated:
    size: 3
    # Don't require all replicas before acknowledging a write — single failure
    # still serves IO. Default is fine but make explicit.
    requireSafeReplicaSize: true
  parameters:
    # bluestore tuning — leave at defaults; revisit when we add 2nd disk topology.
    compression_mode: none
---
# ─────────────────────────────────────────────────────────────────────────
# StorageClass: ceph-block (RBD).
# RWO block storage — replacement target for local-path on stateful workloads
# (Grafana DB, Mimir block, Loki chunks via PVC, future Postgres for shared
# tooling, etc).
# ─────────────────────────────────────────────────────────────────────────
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ceph-block
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: rook-ceph.rbd.csi.ceph.com
parameters:
  clusterID: rook-ceph
  pool: replicapool
  imageFormat: "2"
  imageFeatures: layering
  csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
  csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph
  csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
  csi.storage.k8s.io/controller-expand-secret-namespace: rook-ceph
  csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
  csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph
  csi.storage.k8s.io/fstype: xfs
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
---
# ─────────────────────────────────────────────────────────────────────────
# CephFilesystem — RWX shared filesystem.
# Used for cross-pod shared storage where RWO isn't enough (e.g. Loki
# index cache, Promtail position files when shared, future shared scratch).
# ─────────────────────────────────────────────────────────────────────────
apiVersion: ceph.rook.io/v1
kind: CephFilesystem
metadata:
  name: cephfs
  namespace: rook-ceph
spec:
  metadataPool:
    failureDomain: host
    replicated:
      size: 3
      requireSafeReplicaSize: true
  dataPools:
    - name: replicated
      failureDomain: host
      replicated:
        size: 3
        requireSafeReplicaSize: true
  preserveFilesystemOnDelete: true
  metadataServer:
    activeCount: 1
    activeStandby: true
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits:   { cpu: 1000m, memory: 1Gi }
---
# ─────────────────────────────────────────────────────────────────────────
# StorageClass: ceph-fs (CephFS).
# RWX filesystem storage.
# ─────────────────────────────────────────────────────────────────────────
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ceph-fs
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: rook-ceph.cephfs.csi.ceph.com
parameters:
  clusterID: rook-ceph
  fsName: cephfs
  pool: cephfs-replicated
  csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
  csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph
  csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
  csi.storage.k8s.io/controller-expand-secret-namespace: rook-ceph
  csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
  csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
---
# ─────────────────────────────────────────────────────────────────────────
# CephObjectStore — RGW for S3-compatible object backend.
# This is the future home for Loki chunks, Mimir long-term blocks, Tempo
# traces — all the LGTM stack uses S3-compatible API. Lets us avoid the
# Bento->S3 dependency on AWS for on-prem observability.
# ─────────────────────────────────────────────────────────────────────────
apiVersion: ceph.rook.io/v1
kind: CephObjectStore
metadata:
  name: object-store
  namespace: rook-ceph
spec:
  metadataPool:
    failureDomain: host
    replicated:
      size: 3
  dataPool:
    failureDomain: host
    erasureCoded:
      dataChunks: 2
      codingChunks: 1
  preservePoolsOnDelete: false
  gateway:
    sslCertificateRef: ""
    port: 80
    instances: 2
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits:   { cpu: 1000m, memory: 1Gi }
    placement:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: DoesNotExist
---
# ─────────────────────────────────────────────────────────────────────────
# StorageClass: ceph-bucket — ObjectBucketClaim provisioner.
# Apps that need an S3 bucket create an OBC referencing this SC; Rook
# returns endpoint + credentials in a ConfigMap + Secret.
# ─────────────────────────────────────────────────────────────────────────
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ceph-bucket
provisioner: rook-ceph.ceph.rook.io/bucket
parameters:
  objectStoreName: object-store
  objectStoreNamespace: rook-ceph
reclaimPolicy: Delete
