apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: risingwave-dashboard
  namespace: risingwave
  labels:
    app.kubernetes.io/managed-by: flux
    team: risingwave
  annotations:
    # Phase 1 cleanup gotcha: external-dns v0.20.0 produces ZERO endpoints
    # for istio-virtualservice source when bound Gateway Service is ClusterIP
    # without per-VS target annotation. Required.
    external-dns.alpha.kubernetes.io/target: "10.10.82.21,10.10.82.22,10.10.82.26,10.10.82.27,10.10.82.28,10.10.82.178,10.10.82.180"
spec:
  gateways:
    - istio-ingress/shared-http
  hosts:
    - risingwave-dashboard.usxpress.io
  http:
    - route:
        - destination:
            host: risingwave-console.risingwave.svc.cluster.local
            port:
              number: 8020
