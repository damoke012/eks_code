---
# Admin password from SM. creationPolicy: Merge so it adds admin.password to the
# chart-created argocd-secret without owning/replacing it (server.secretkey stays
# whatever Helm generated on this greenfield install).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-admin-credentials
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: default
  target:
    name: argocd-secret
    creationPolicy: Merge
  data:
    - secretKey: admin.password
      remoteRef:
        key: op-usxpress-qa/platform/argocd
        property: admin.password
    - secretKey: admin.passwordMtime
      remoteRef:
        key: op-usxpress-qa/platform/argocd
        property: admin.passwordMtime
