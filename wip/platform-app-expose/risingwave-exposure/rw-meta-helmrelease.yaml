# Tim's RW postgres meta exposure for DBeaver — root-zone naming.
# Suspend: true until ghostunnel-rw-meta Deployment is live.
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rw-meta-expose
  namespace: risingwave
spec:
  suspend: true
  interval: 10m
  chart:
    spec:
      chart: ./infrastructure/platform-app-expose/chart
      sourceRef:
        kind: GitRepository
        name: infra
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    hostname: risingwave-meta.usxpress.io
    service:
      name: ghostunnel-rw-meta
      namespace: risingwave
      port: 5432
    protocol: tls-passthrough
    tls:
      backend: true
    certificate:
      create: false
    cnp:
      enabled: false
    externalDNS:
      enabled: true
      target: rw-ingress.op-dev.usxpress.io
