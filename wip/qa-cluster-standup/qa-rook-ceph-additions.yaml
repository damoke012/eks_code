# NOTE: the op-qa CephBlockPool/StorageClass may already exist in the inherited
# rook-ceph-cluster manifests (from op-dev) — reuse those; only the CephCluster
# storage/placement block needs QA raw-device values. The SC name MUST be
# "ceph-block" to satisfy the existing grafana PVC.
