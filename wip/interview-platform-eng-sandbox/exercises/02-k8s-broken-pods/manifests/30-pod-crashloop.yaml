# Pod C — CrashLoopBackOff scenario.
# Container expects an env var DB_URL that should come from a ConfigMap key,
# but the ConfigMap key is named differently. App exits 1 immediately.
# Expected state: CrashLoopBackOff after a few restarts.
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: broken
data:
  database_uri: "postgres://db.example.internal:5432/myapp"
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-c-config
  namespace: broken
  labels:
    purpose: configmap-demo
spec:
  restartPolicy: Always
  containers:
    - name: app
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          if [ -z "$DB_URL" ]; then
            echo "ERROR: DB_URL is not set; cannot start"
            exit 1
          fi
          echo "starting with DB_URL=$DB_URL"
          sleep 3600
      env:
        - name: DB_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DB_URL    # <-- typo / mismatch — ConfigMap has `database_uri`
