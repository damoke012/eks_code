apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: grafana
spec:
  interval: 10m
  chart:
    spec:
      chart: grafana
      version: "8.x"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: grafana
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: grafana-values
      valuesKey: values.yaml
  values:
    # Admin credentials from ExternalSecret (overrides chart defaults)
    admin:
      existingSecret: grafana-admin
      userKey: admin-user
      passwordKey: admin-password
