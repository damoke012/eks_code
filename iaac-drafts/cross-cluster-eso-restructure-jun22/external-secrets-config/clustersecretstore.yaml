---
# Default ClusterSecretStore — backed by AWS Secrets Manager via IRSA.
# This is the workhorse CSS used by the vast majority of ExternalSecrets
# on the cluster.
#
# IaC note: Lives in its own Kustomization (external-secrets-config) with
# wait: true. The cross-cluster (cloud-eks) CSS was split into a separate
# Kustomization (cross-cluster-eso) with wait: false so its terminal-failure
# state during bootstrap doesn't block this Kustomization.
# See: 04-secrets-credentials/external-secrets-config-cascade.md
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: default
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-2
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
