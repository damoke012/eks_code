---
# Cross-cluster ClusterSecretStore — pulls k8s secrets directly from cloud
# usxpress-dev EKS via bearer token. Used for cloud-created k8s secrets that
# aren't mirrored to AWS SM (Kafka client creds, Mongo Atlas X.509 cert, ...).
#
# Token + server endpoint + CA bundle live in cloud-eks-reader-token Secret in
# external-secrets ns, populated by 'Seed Cross-Cluster ESO Token' runbook
# (OnPremise Octopus space → onprem-platform-bootstrap project).
#
# IaC note: This CSS lives in its own Kustomization (cross-cluster-eso) with
# wait: false in the Flux Kustomization spec. This prevents the chicken-and-egg
# bootstrap where:
#   - external-secrets-config waited on this CSS Ready
#   - This CSS needed cloud-eks-reader-token Secret
#   - That Secret comes from the Octopus runbook
#   - Octopus worker was downstream of external-secrets-config Kustomization
# See troubleshooting catalog: 04-secrets-credentials/external-secrets-config-cascade.md
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: cloud-eks
spec:
  provider:
    kubernetes:
      remoteNamespace: geoservices
      server:
        # URL + CA loaded from the seeded secret
        url: https://293F4BDF6DB190B6096A51921DD86B12.gr7.us-east-2.eks.amazonaws.com
        caProvider:
          type: Secret
          name: cloud-eks-reader-token
          namespace: external-secrets
          key: ca
      auth:
        token:
          bearerToken:
            name: cloud-eks-reader-token
            key: token
            namespace: external-secrets
