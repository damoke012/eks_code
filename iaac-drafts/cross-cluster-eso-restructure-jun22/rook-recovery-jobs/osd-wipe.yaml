# Rook-Ceph OSD wipe template
#
# WARNING — DESTRUCTIVE. Wipes /dev/sdb on the specified node.
#
# Use when:
#   - An OSD has stale bluestore state that needs re-bootstrap
#   - Per catalog entry 02-storage/rook-osd-keyring-missing.md (Option B)
#   - Per catalog entry 02-storage/rook-osd-pg-peering-crash.md (the only fix)
#
# Pre-requisites BEFORE applying:
#   1. ceph osd out osd.<N>
#   2. ceph osd purge <N> --yes-i-really-mean-it
#   3. kubectl -n rook-ceph delete deploy rook-ceph-osd-<N>
#   4. kubectl -n rook-ceph delete job rook-ceph-osd-prepare-<NODE>
#
# Substitute <NODE> with target worker hostname before apply (e.g., talos-wk-op-dev-2)
apiVersion: v1
kind: Pod
metadata:
  name: osd-wipe-<NODE>
  namespace: rook-ceph
  labels:
    app: rook-recovery
    operation: osd-wipe
spec:
  nodeName: <NODE>
  restartPolicy: Never
  tolerations:
  - operator: Exists
  containers:
  - name: wipe
    image: alpine:3.19
    command:
    - sh
    - -c
    - |
      set -e
      echo "Wipe start: /dev/sdb on $(hostname)"
      ls -la /dev/sdb
      SIZE=$(blockdev --getsize64 /dev/sdb)
      echo "Size: $SIZE bytes"

      # Zero first 100MB — covers bluestore header + GPT + partition tables
      echo "Zeroing first 100MB..."
      dd if=/dev/zero of=/dev/sdb bs=1M count=100 status=progress

      # blkdiscard for SSDs (best-effort)
      apk add --quiet util-linux 2>&1 || true
      blkdiscard /dev/sdb 2>&1 || echo "(blkdiscard not supported on this device, skipping)"

      # Re-read partition table
      blockdev --rereadpt /dev/sdb 2>&1 || true

      echo ""
      echo "Post-wipe first 1KB hex dump (should be all zeros):"
      dd if=/dev/sdb bs=1024 count=1 2>/dev/null | xxd | head -3

      echo "Wipe complete"
    securityContext:
      privileged: true
    volumeMounts:
    - name: dev
      mountPath: /dev
  volumes:
  - name: dev
    hostPath:
      path: /dev
