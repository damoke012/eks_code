# Prometheus ServiceMonitor for the Ceph mgr's built-in prometheus module.
# Without this, no ceph_* metrics reach Prometheus and the rook-ceph-health
# PromRule has nothing to fire on.
#
# kube-prometheus-stack selects ServiceMonitor via serviceMonitorSelector.matchLabels:
#   { release: prometheus-stack }
# Same convention as PrometheusRule discovery.
#
# The mgr exposes /metrics on the rook-ceph-mgr Service (port http-metrics:9283).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: rook-ceph-mgr
  namespace: rook-ceph
  labels:
    app: rook-ceph-mgr
    app.kubernetes.io/part-of: storage
    release: prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - rook-ceph
  selector:
    matchLabels:
      app: rook-ceph-mgr
      rook_cluster: rook-ceph
  endpoints:
    - port: http-metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 25s
      honorLabels: true
