---
# geo-handler app-level scaffolding for on-prem.
#
# Kafka SASL creds + schema registry creds are NOT bridged here — the dx-handler
# helm chart generates its own ExternalSecrets (geoenrichment-sync-handler-kafka-creds,
# -kafka-reg-creds) targeting cloud AWS SM via the 'default' ClusterSecretStore.
#
# The Atlas X.509 m-u ExternalSecret (cross-cluster via cloud-eks CSS) was moved
# to infrastructure/cross-cluster-app-secrets/geoenrichment-sync-handler-m-u.yaml
# on 2026-06-22 so that its bootstrap dependency on the Octopus-seeded
# cloud-eks-reader-token Secret (INFRA-1535) does not block this Kustomization.
# Restore-from-disaster: nothing manual; once INFRA-1535 runbook seeds the token,
# the ES will auto-sync.
apiVersion: v1
kind: Namespace
metadata:
  name: geoservices
  labels:
    app.kubernetes.io/part-of: onprem-shared-secrets
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: geoenrichment-sync-handler-m-u
  namespace: geoservices
  labels:
    app.kubernetes.io/managed-by: flux
data:
  MONGODB__CLUSTER__CONNECTION_STRING: "mongodb+srv://mongodb-pl-0.bjpgt.mongodb.net/?authSource=%24external&authMechanism=MONGODB-X509&retryWrites=true&w=majority&readPreference=secondaryPreferred&appName=dev-geoservices-geoenrichment-sync-handler"
  MONGODB__CLUSTER__SERVER: "mongodb-pl-0.bjpgt.mongodb.net"
  MONGODB__CLUSTER__TLS_CRT_KEY_FILE: "/etc/mongodb/certs/tls-combined.pem"
  MONGO__CUSTOMER_DATABASE__COLLECTION_NAME: "dev_customers"
  MONGO__CUSTOMER_DATABASE__DATABASE_NAME: "customer"
  MONGO__DRIVER_DATABASE__COLLECTION_NAME: "dev_hometimes"
  MONGO__DRIVER_DATABASE__DATABASE_NAME: "driver"
  MONGO__ORDER_DATABASE__COLLECTION_NAME: "dev_orders"
  MONGO__ORDER_DATABASE__DATABASE_NAME: "order"
  MONGO__TRAILER_DATABASE__COLLECTION_NAME: "dev_trailers"
  MONGO__TRAILER_DATABASE__DATABASE_NAME: "trailer"
  MONGO__TRUCK_DATABASE__COLLECTION_NAME: "dev_trucks"
  MONGO__TRUCK_DATABASE__DATABASE_NAME: "truck"
