apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base
  - argocd-admin-externalsecret.yaml
  - argocd-git-externalsecret.yaml

# DELIBERATELY ABSENT:
#  application-risingwave.yaml - Argo CD Application targeting the risingwave
#    namespace from the same path Flux reconciles, with prune+selfHeal+SSA.
#    Two controllers self-healing the same objects fight indefinitely, and
#    prune lets Argo delete resources in Tim's namespace. RisingWave is
#    Flux-managed via clusters/<cluster>/flux-system/risingwave.yaml.
#  service-nodeport.yaml - platform standard is Istio ingress; the NodePort
#    also exposed :443 against a plain-HTTP targetPort 8080.
#  raw install.yaml from raw.githubusercontent.com - replaced by the Helm
#    chart in base, which takes values (nodeSelector, limits, params).

# dev has flat workers (no `pool` labels), so base's nodeSelector would
# leave every Argo CD pod Pending.
patches:
  - target:
      kind: HelmRelease
      name: argocd
    patch: |
      - op: remove
        path: /spec/values/global/nodeSelector
