---
# G4 — repo credentials from SecretsManager, never committed.
#
# PR #73 committed a real sshPrivateKey to git. That key is COMPROMISED and must
# be rotated regardless of what happens to the PR. Generate a NEW deploy key for
# Argo CD; do not reuse it.
#
# The SM key path is environment-specific and is patched by each overlay --
# `PLACEHOLDER_SM_PATH` below is replaced there. If you ever see that literal
# reach the cluster, the overlay patch did not apply.
#
# ⚠️ A green SecretSynced proves the sync RAN, not that the value WORKS. This has
# now misled us twice (Wiz 6-char placeholders, QA etcd PLACEHOLDER_POPULATE).
# Verify by having Argo CD actually connect:
#   argocd repo list        # STATUS must be "Successful", not just present
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-repo-creds
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: argocd-repo-creds
    creationPolicy: Owner
    template:
      metadata:
        labels:
          # This label is what makes Argo CD consume the Secret as credentials.
          # Without it the Secret exists, syncs green, and Argo CD ignores it.
          argocd.argoproj.io/secret-type: repo-creds
      data:
        type: git
        url: ssh://git@github.com/variant-inc
        sshPrivateKey: "{{ .sshPrivateKey }}"
  data:
    - secretKey: sshPrivateKey
      remoteRef:
        key: PLACEHOLDER_SM_PATH
        property: sshPrivateKey
