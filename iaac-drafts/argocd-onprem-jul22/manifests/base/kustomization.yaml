apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# NOTE: no top-level `namespace:` here on purpose.
# In iaac-risingwave-onprem that transformer silently rewrote a Velero Schedule
# out of the velero namespace, so it was created, reported no error, and would
# never have backed anything up. Every resource below carries its own explicit
# namespace instead.

resources:
  - namespace.yaml
  - helmrepository.yaml
  - helmrelease.yaml
  - appprojects.yaml
  - externalsecret-repo-creds.yaml
