apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base

patches:
  - target:
      kind: ExternalSecret
      name: argocd-repo-creds
    patch: |
      - op: replace
        path: /spec/data/0/remoteRef/key
        value: op-usxpress-qa/argocd/deploy-key

# QA keeps base's `nodeSelector: {pool: platform}` - the pool labels exist here.
#
# TODO before QA rollout: add virtualservice.yaml (Istio Gateway name + hostname).
# Confirm against the live cluster first, do not guess:
#   kubectl -n istio-system get gateway
#   kubectl -n istio-system get svc istio-ingressgateway
# Until it exists, reach the UI with:
#   kubectl -n argocd port-forward svc/argocd-server 8080:80
# Do NOT add a NodePort as a shortcut (G5).
