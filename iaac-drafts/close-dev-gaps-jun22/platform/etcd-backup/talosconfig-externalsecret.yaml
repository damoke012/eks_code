---
# Pull talosconfig (machine config secrets ca/crt/key) from AWS SM.
# Manually seed BEFORE first CronJob run:
#   aws secretsmanager create-secret \
#     --name op-usxpress-dev/talosconfig \
#     --secret-string file:///tmp/talosconfig-op-usxpress-dev \
#     --profile usx-dev
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: talosconfig
  namespace: etcd-backup
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: default
  target:
    name: talosconfig
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: config
      remoteRef:
        key: op-usxpress-dev/talosconfig
        property: config
