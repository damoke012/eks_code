apiVersion: v1
kind: ServiceAccount
metadata:
  name: etcd-backup
  namespace: etcd-backup
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::700736442855:role/op-usxpress-dev-etcd-backup
