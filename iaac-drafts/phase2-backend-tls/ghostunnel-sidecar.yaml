# Phase 2 — ghostunnel TLS terminator in front of RW-2 frontend (Option B).
#
# Lives in risingwave-2 namespace, alongside the RW-2 workload.
# Listens on :4567 with TLS using cert from Secret rw2-sql-tls (issued by
# the cert-manager Certificate `rw2-sql-tls` — see rw2-sql-frontend-cert.yaml).
# Proxies plaintext to the RW frontend Service on its native port 4567.
#
# ghostunnel v1.7.3's --keystore flag expects ONE file containing both cert
# and key (or a PKCS12 bundle). cert-manager writes tls.crt and tls.key
# separately in the Secret, so an initContainer concatenates them into
# /tls-out/keystore.pem on every pod start.
#
# Sidecar inject is disabled — ghostunnel terminates TLS at the pod, no need
# for mesh re-encryption inside the namespace for this hop.
#
# Wire-up: the VirtualService rw2-sql-passthrough in iaac-talos-flux-platform
# swaps its destination host from `risingwave-frontend.risingwave-2.svc` to
# `ghostunnel-rw2-sql.risingwave-2.svc`. That's a separate PR landed AFTER
# this ghostunnel resource is Running.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghostunnel-rw2-sql
  namespace: risingwave-2
  labels:
    app.kubernetes.io/name: ghostunnel-rw2-sql
    app.kubernetes.io/component: tls-terminator
    app.kubernetes.io/part-of: risingwave-2
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ghostunnel-rw2-sql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ghostunnel-rw2-sql
        app.kubernetes.io/component: tls-terminator
      annotations:
        sidecar.istio.io/inject: "false"
        ambient.istio.io/redirection: "disabled"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      initContainers:
        # ghostunnel v1.7.3 --keystore wants ONE file with cert AND key.
        # cert-manager writes them separately; concatenate at pod start.
        - name: build-keystore
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              cat /tls-src/tls.crt /tls-src/tls.key > /tls-out/keystore.pem
              chmod 0400 /tls-out/keystore.pem
              echo "keystore built: $(wc -c < /tls-out/keystore.pem) bytes"
          volumeMounts:
            - name: tls-src
              mountPath: /tls-src
              readOnly: true
            - name: tls-out
              mountPath: /tls-out
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "32Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: ghostunnel
          image: ghostunnel/ghostunnel:v1.7.3
          args:
            - server
            - --listen=:4567
            - --target=risingwave-frontend.risingwave-2.svc.cluster.local:4567
            - --keystore=/tls-out/keystore.pem
            # No client cert required — psql clients connect with sslmode=require
            # but don't present mTLS material (use --allow-cn=... if mTLS later).
            - --disable-authentication
            - --status=:9090
            - --metrics-prometheus
          ports:
            - name: tls
              containerPort: 4567
              protocol: TCP
            - name: status
              containerPort: 9090
              protocol: TCP
          volumeMounts:
            - name: tls-out
              mountPath: /tls-out
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            tcpSocket:
              port: 4567
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 4567
            initialDelaySeconds: 2
            periodSeconds: 5
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: tls-src
          secret:
            secretName: rw2-sql-tls
        - name: tls-out
          emptyDir:
            medium: Memory
            sizeLimit: 256Ki

---
apiVersion: v1
kind: Service
metadata:
  name: ghostunnel-rw2-sql
  namespace: risingwave-2
  labels:
    app.kubernetes.io/name: ghostunnel-rw2-sql
    app.kubernetes.io/component: tls-terminator
spec:
  selector:
    app.kubernetes.io/name: ghostunnel-rw2-sql
  ports:
    - name: tls
      port: 4567
      targetPort: 4567
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ghostunnel-rw2-sql
  namespace: risingwave-2
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ghostunnel-rw2-sql
