apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: prometheus
spec:
  interval: 1h
  url: https://prometheus-community.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-stack
  namespace: prometheus
spec:
  upgrade:
    remediation:
      retries: 3
  install:
    remediation:
      retries: 3
  interval: 10m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "72.x"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: prometheus
  values:
    alertmanager:
      enabled: false
    grafana:
      enabled: false
    # Was: false — re-enabled for node_* / cpu / memory / fs metrics.
    # Sub-chart values configured below under prometheus-node-exporter.
    nodeExporter:
      enabled: true
    kubeStateMetrics:
      enabled: true
    # Per /onprem-safety Rule 1: DaemonSet must explicitly exclude CP nodes.
    # tolerations: [] disables the default chart toleration (operator: Exists)
    # which would otherwise schedule on CPs and risk OOM.
    #
    # hostNetwork: false avoids a hostPort 9100 collision with the existing
    # standalone prometheus chart's node-exporter in risingwave-2 ns (and
    # monitoring ns) which already binds 9100 on every worker. /proc /sys /
    # host volume mounts still give host metrics regardless of network NS;
    # only node_network_* interface metrics are scoped to the pod (acceptable
    # for the baseline dashboard). Future cleanup: consolidate to a single
    # node-exporter DS once the legacy prometheus charts are retired.
    prometheus-node-exporter:
      hostNetwork: false
      tolerations: []
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      resources:
        requests:
          cpu: 50m
          memory: 30Mi
        limits:
          cpu: 200m
          memory: 100Mi
    prometheus:
      prometheusSpec:
        retention: 7d
        # Bumped 1Gi -> 4Gi after OOMKill during WAL replay + new scrape pool
        # load. Drivers: 30+ ServiceMonitors across the cluster (default + KSM
        # + kubelets x N nodes + node-exporters x 7 + 9 PrometheusRules with
        # heavy queries). Plus serviceMonitorSelectorNilUsesHelmValues: false
        # auto-discovers every ServiceMonitor including duplicate ones from
        # the restore-test ns (Velero exercise leftover — schedule for cleanup).
        # 4Gi has headroom for adding 1-2 more apps without re-bumping.
        resources:
          requests:
            cpu: 100m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 4Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: ceph-block
              accessModes: [ReadWriteOnce]
              resources:
                requests:
                  storage: 20Gi
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
