apiVersion: v1
kind: Namespace
metadata:
  name: prometheus
  labels:
    # node-exporter requires host-level access (hostNetwork, hostPID, hostPath
    # volumes for /proc /sys /, hostPort 9100). Cluster default PSA enforce is
    # 'baseline' which rejects all of those. Set the namespace to 'privileged'
    # for the node-exporter DaemonSet. Other pods in this namespace (operator,
    # kube-state-metrics, prometheus StatefulSet) don't need privileged but
    # accept it.
    #
    # Follow-up: split node-exporter to its own namespace via the chart's
    # prometheus-node-exporter.namespaceOverride so the prometheus ns can
    # stay restricted.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
