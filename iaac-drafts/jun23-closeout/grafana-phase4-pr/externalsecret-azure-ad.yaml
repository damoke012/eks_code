apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-azure-ad-creds
  namespace: grafana
  labels:
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/component: platform-observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: default
    kind: ClusterSecretStore
  target:
    name: grafana-azure-ad-creds
    creationPolicy: Owner
    # Render the secret with Grafana's auto-mapped env var names so
    # envFromSecret in the chart values injects them directly.
    template:
      type: Opaque
      data:
        GF_AUTH_AZUREAD_CLIENT_ID: "{{ .client_id }}"
        GF_AUTH_AZUREAD_CLIENT_SECRET: "{{ .client_secret }}"
  data:
    - secretKey: client_id
      remoteRef:
        key: op-usxpress-dev/platform/grafana/azure-ad
        property: client_id
    - secretKey: client_secret
      remoteRef:
        key: op-usxpress-dev/platform/grafana/azure-ad
        property: client_secret
