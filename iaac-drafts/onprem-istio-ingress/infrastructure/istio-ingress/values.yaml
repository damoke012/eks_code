apiVersion: v1
kind: ConfigMap
metadata:
  name: istio-ingressgateway-values
  namespace: istio-ingress
data:
  values.yaml: |
    # DaemonSet so every worker IP binds 80/443. VPN clients hit any worker IP.
    kind: DaemonSet

    # Direct host networking; ports 80/443 land on the worker's physical NIC IP.
    hostNetwork: true
    dnsPolicy: ClusterFirstWithHostNet

    # Pin to workers only; Talos control planes block NodePort/hostPort by default
    # and we don't want ingress traffic on the API VIP nodes anyway.
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: DoesNotExist

    # Bind the privileged ports directly inside the container.
    containerSecurityContext:
      capabilities:
        add: ["NET_BIND_SERVICE"]
        drop: ["ALL"]
      runAsUser: 1337
      runAsGroup: 1337
      runAsNonRoot: true
      allowPrivilegeEscalation: true
      readOnlyRootFilesystem: true

    # ClusterIP service is unused with hostNetwork; keep it so VirtualService/Gateway selectors still find the pod.
    service:
      type: ClusterIP
      ports:
      - name: status-port
        port: 15021
        targetPort: 15021
      - name: http2
        port: 80
        targetPort: 80
      - name: https
        port: 443
        targetPort: 443

    # Resources sized for low-volume dev ingress; tune after observability lands.
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 2000m
        memory: 1Gi

    # Avoid the default autoscaler — DaemonSet sizes itself.
    autoscaling:
      enabled: false

    # Pod labels used by Gateway selector (istio: ingressgateway is the convention).
    labels:
      istio: ingressgateway
      app: istio-ingressgateway

    # Ensure pods tolerate the same taints workers may have (no special taints today; reserved for future).
    tolerations: []
