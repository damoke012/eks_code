# Add to iaac-talos-flux-cluster/clusters/bm-dev/flux-system/infra.yaml
# (paste as a NEW Kustomization block; do NOT replace existing entries)
#
# Dependency chain: istio-base -> istiod -> ztunnel + istio-cni -> istio-ingress
# - ingressgateway is a data-plane add-on; it must come after the control plane.
# - PSA-privileged namespace must exist before the HelmRelease lands; the
#   Kustomization installs `namespace.yaml`, then `release.yaml`+`values.yaml`,
#   then `gateway.yaml` in a single reconciliation pass.

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: istio-ingress
  namespace: flux-system
spec:
  dependsOn:
  - name: istiod
  - name: ztunnel
  - name: istio-cni
  interval: 10m0s
  retryInterval: 5m0s
  path: ./infrastructure/istio-ingress
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra
  wait: true
  timeout: 10m0s
