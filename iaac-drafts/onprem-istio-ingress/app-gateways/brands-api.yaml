# Smoke-test Gateway for piece 1 ingress validation.
#
# Pairs with existing VirtualService istio-system/api-brands-dev-usxpress-io,
# which already references gateways: ["enterprise/brands-api"].
#
# Apply MANUALLY after the istio-ingressgateway DaemonSet is healthy:
#   kubectl apply -f brands-api.yaml
#
# NOT in the platform-repo Kustomization. Per-app Gateways belong to app teams,
# not platform. Final home for these (MageRunner-generated vs app-gateways/ dir
# in flux-platform) is an open architectural decision — for now, hand-applied.

apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: brands-api
  namespace: enterprise
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "api.brands.dev.usxpress.io"
  # HTTPS listener activates after piece 3 (cert-manager public ClusterIssuer).
  # - port:
  #     number: 443
  #     name: https
  #     protocol: HTTPS
  #     tls:
  #       mode: SIMPLE
  #       credentialName: brands-api-tls
  #   hosts:
  #   - "api.brands.dev.usxpress.io"
