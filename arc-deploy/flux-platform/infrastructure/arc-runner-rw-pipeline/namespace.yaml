apiVersion: v1
kind: Namespace
metadata:
  name: arc-runners
  labels:
    # Ephemeral runner pods run job steps directly (no dind, no kubernetes
    # container mode). They run apt installs via sudo + reach RW-2 frontend +
    # assume an AWS role via OIDC — none of which need privileged PodSecurity.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline
