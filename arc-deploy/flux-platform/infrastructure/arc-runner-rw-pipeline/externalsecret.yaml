apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: arc-runner-pat
  namespace: arc-runners
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: default
  target:
    name: arc-runner-pat
    creationPolicy: Owner
  # SM secret op-usxpress-dev/risingwave-pipeline/github-runner-pat holds
  # {"github_token":"github_pat_..."}. dataFrom.extract maps that JSON to a
  # k8s secret with key `github_token` — exactly the key the ARC
  # gha-runner-scale-set chart expects for PAT auth (githubConfigSecret).
  dataFrom:
    - extract:
        key: op-usxpress-dev/risingwave-pipeline/github-runner-pat
