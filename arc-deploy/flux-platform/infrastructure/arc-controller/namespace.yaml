apiVersion: v1
kind: Namespace
metadata:
  name: arc-systems
  labels:
    # ARC controller + listener run here. Standard non-root workloads —
    # baseline PodSecurity is sufficient (no privileged, hostPath, or dind).
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline
